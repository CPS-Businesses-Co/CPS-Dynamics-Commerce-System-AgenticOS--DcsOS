name: DCS main.yaml Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

env:
  NODE_VERSION: "22"
  GO_VERSION: "1.24"
  PYTHON_VERSION: "3.11"

jobs:
  # ══════════════════════════════════════════════════════════════════════════
  #  LINT STAGE
  # ══════════════════════════════════════════════════════════════════════════
  lint-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: app/package-lock.json
      - name: Install & Lint App
        working-directory: ./app
        run: |
          npm clean-install --progress=false
          npm run lint

  lint-pos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: cps-enterprise-dcs/pos-interface/package-lock.json
      - name: Install & Lint POS
        working-directory: ./cps-enterprise-dcs/pos-interface
        run: |
          npm clean-install --legacy-peer-deps --progress=false
          npm run lint

  lint-regional-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: cps-enterprise-dcs/regional-agent/go.sum
      - name: Go Vet
        working-directory: ./cps-enterprise-dcs/regional-agent
        run: go vet ./...

  # ══════════════════════════════════════════════════════════════════════════
  #  BUILD STAGE
  # ══════════════════════════════════════════════════════════════════════════
  build-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: app/package-lock.json
      - name: Build App
        working-directory: ./app
        run: |
          npm clean-install --progress=false
          npm run build
      - name: Upload App Artifact
        uses: actions/upload-artifact@v7
        with:
          name: app-dist
          path: app/dist/
          retention-days: 1

  build-pos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: cps-enterprise-dcs/pos-interface/package-lock.json
      - name: Build POS
        working-directory: ./cps-enterprise-dcs/pos-interface
        run: |
          npm clean-install --legacy-peer-deps --progress=false
          npm run build
      - name: Upload POS Artifact
        uses: actions/upload-artifact@v7
        with:
          name: pos-dist
          path: cps-enterprise-dcs/pos-interface/dist/
          retention-days: 1

  build-regional-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: cps-enterprise-dcs/regional-agent/go.sum
      - name: Build Go Binary
        working-directory: ./cps-enterprise-dcs/regional-agent
        run: |
          mkdir -p bin
          go build -o bin/ ./...
      - name: Upload Regional Agent Artifact
        uses: actions/upload-artifact@v7
        with:
          name: regional-agent-bin
          path: cps-enterprise-dcs/regional-agent/bin/
          retention-days: 1

  # ══════════════════════════════════════════════════════════════════════════
  #  TEST STAGE
  # ══════════════════════════════════════════════════════════════════════════
  test-local-agent:
    runs-on: ubuntu-latest
    continue-on-error: true # يكافئ allow_failure: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: Test Python Local Agent
        run: |
          pip install --quiet -r cps-enterprise-dcs/local-agent/requirements.txt
          # التعامل مع Exit code 5 (no tests collected) كنجاح
          python -m pytest cps-enterprise-dcs/local-agent/src/ -v --tb=short || [ $? -eq 5 ]

  test-regional-agent:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: cps-enterprise-dcs/regional-agent/go.sum
      - name: Test Regional Agent
        working-directory: ./cps-enterprise-dcs/regional-agent
        run: go test ./... -v

  # ══════════════════════════════════════════════════════════════════════════
  #  DEPLOY STAGE
  # ══════════════════════════════════════════════════════════════════════════
  deploy-cloudflare:
    needs: build-app
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://${{ secrets.CLOUDFLARE_WORKERS_SUBDOMAIN }}.workers.dev
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Download App Artifact
        uses: actions/download-artifact@v8
        with:
          name: app-dist
          path: app/dist
      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@latest versions upload --assets=./app/dist
