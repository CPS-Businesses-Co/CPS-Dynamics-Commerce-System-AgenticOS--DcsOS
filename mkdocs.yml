site_name: CP'S Enterprise DCS
site_url: https://ahmedhajjajofficial.github.io/CPS-Dynamics-Commerce-System-AgenticOS/

theme:
  name: material
  language: ar
  direction: rtl
  logo: assets/logo.png
  favicon: assets/favicon.png
  custom_dir: docs/overrides
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: cyan
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: cyan
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - toc.integrate
    - code.copy
    - code.annotate
    - search.suggest
    - search.highlight
    - content.tabs.link

extra_css:
  - stylesheets/glassmorphism.css
  - stylesheets/bilingual.css

extra:
  alternate:
    - name: العربية
      link: /CPS-Dynamics-Commerce-System-AgenticOS/ar/
      lang: ar
    - name: English
      link: /CPS-Dynamics-Commerce-System-AgenticOS/en/
      lang: en
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Ahmedhajjajofficial/CPS-Dynamics-Commerce-System-AgenticOS

copyright: "© 2026 CP'S Businesses for Enterprises Tech Solution. All rights reserved. | جميع الحقوق محفوظة."

plugins:
  - search
  - i18n:
      default_language: ar
      default_language_only: false
      docs_structure: folder
      languages:
        - locale: ar
          default: true
          name: العربية
          build: true
        - locale: en
          name: English
          build: true
          nav_translations:
            الرئيسية: Home
            الهيكلية: Architecture
            واجهة البرمجة: API
            التطوير: Development
            النشر: Deployment
  - minify:
      minify_html: true

nav:
  - الرئيسية: index.md
  - الهيكلية: architecture.md
  - واجهة البرمجة: api.md
  - التطوير: development.md
  - النشر: deployment.md

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
